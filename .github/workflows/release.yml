name: release

# Build prebuilt binaries and attach them to the GitHub Release when a
# version tag is pushed (e.g. `git tag v0.1.0 && git push origin v0.1.0`).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and upload assets for"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            asset: darwin-arm64
          - os: macos-14
            target: x86_64-apple-darwin
            asset: darwin-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset: linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            asset: linux-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # musl + aarch64 cross builds need musl tools and a cross linker.
      - name: Install Linux cross toolchain
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Build and package
        env:
          # Cross linker for aarch64 musl; harmless for other targets.
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_musl: aarch64-linux-gnu-gcc
        run: |
          make dist-target TARGET=${{ matrix.target }} ASSET=${{ matrix.asset }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codemcp-${{ matrix.asset }}
          path: |
            dist/codemcp-${{ matrix.asset }}.tar.gz
            dist/codemcp-${{ matrix.asset }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -R dist

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
